server {
    listen 80;
    server_name cody.danblanco.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cody.danblanco.dev;

    # Filled in by certbot
    ssl_certificate     /etc/letsencrypt/live/cody.danblanco.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cody.danblanco.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy everything to Vite dev server
    # Vite handles /query and /repos internally via its own proxy to the api container
    location / {
        proxy_pass         http://localhost:5173;
        proxy_http_version 1.1;

        # WebSocket support (Vite HMR)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }
}
